<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CashSplash</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">
        <h1>💸 CashSplash</h1>
        <p class="subtitle">Real-time currency conversion</p>

        <form method="POST" onsubmit="showSpinner()">
            <input
                type="number"
                name="amount"
                placeholder="Enter amount"
                step="0.01"
                min="0"
                required
            >

            <div class="currency-row">
                <select name="from_currency">
                    {% for currency in currencies %}
                        <option value="{{ currency }}" {% if currency == from_currency %}selected{% endif %}>
                            {{ currency }}
                        </option>
                    {% endfor %}
                </select>

                <button type="button" class="swap-btn" onclick="swapCurrencies()">⇆</button>

                <select name="to_currency">
                    {% for currency in currencies %}
                        <option value="{{ currency }}" {% if currency == to_currency %}selected{% endif %}>
                            {{ currency }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" id="convert-btn">
                <span id="btn-text">Convert</span>
                <span id="spinner" style="display:none;">⏳</span>
            </button>
        </form>

        {% if error %}
            <div class="error">
                ⚠️ {{ error }}
            </div>
        {% endif %}

        {% if result is not none %}
            <div class="result">
                {{ amount }} {{ from_currency }} = <strong>{{ result }} {{ to_currency }}</strong>
                <p class="rate">Rate: 1 {{ from_currency }} = {{ rate_display }} {{ to_currency }}</p>
            </div>
        {% endif %}
    </div>

    <script>
        function swapCurrencies() {
            const from = document.querySelector('select[name="from_currency"]');
            const to = document.querySelector('select[name="to_currency"]');
            const temp = from.value;
            from.value = to.value;
            to.value = temp;
        }

        function showSpinner() {
            document.getElementById('btn-text').style.display = 'none';
            document.getElementById('spinner').style.display = 'inline';
            document.getElementById('convert-btn').disabled = true;
        }
    </script>

</body>
</html>
